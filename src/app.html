<template>
  <div class="min-h-screen bg-slate-100 px-4 py-8 text-slate-900 sm:px-6">
    <div class="mx-auto flex max-w-6xl flex-col gap-6">
      <section class="overflow-hidden rounded-3xl bg-gradient-to-r from-blue-600 to-cyan-500 px-6 py-8 text-white shadow-lg">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-blue-100">LiftLogic</p>
        <h1 class="mt-2 text-3xl font-bold sm:text-4xl">Warm-up calculator + 4-day workout tracker</h1>
        <p class="mt-3 max-w-3xl text-sm text-blue-50 sm:text-base">
          Plan working sets, track completion, and back up your torso/legs split without leaving the browser.
        </p>
      </section>

      <div class="grid gap-6 xl:grid-cols-[0.95fr_1.4fr]">
        <section class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-xl font-semibold text-slate-900">Warm-up calculator</h2>
              <p class="mt-1 text-sm text-slate-500">Keep the quick Brzycki estimate handy before logging your working sets.</p>
            </div>
          </div>

          <div class="mt-6 space-y-5">
            <label class="block">
              <span class="mb-2 block text-sm font-medium text-slate-700">Working Weight (lbs/kg)</span>
              <input
                type="number"
                value.bind="currentWeight"
                input.trigger="calculateRMs()"
                class="block w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-base shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
              />
            </label>

            <div class="grid gap-3 sm:grid-cols-2">
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">First Warm-Up</p>
                <p class="mt-2 text-lg font-semibold">${roundToPlate(thirtyRM)} lbs/kg</p>
                <p class="text-sm text-slate-500">${FIRST_WARMUP_REPS} reps · 30RM</p>
              </div>

              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Second Warm-Up</p>
                <p class="mt-2 text-lg font-semibold">${roundToPlate(twentyRM)} lbs/kg</p>
                <p class="text-sm text-slate-500">${SECOND_WARMUP_REPS} reps · 20RM</p>
              </div>

              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Third Warm-Up</p>
                <p class="mt-2 text-lg font-semibold">${roundToPlate(tenRM)} lbs/kg</p>
                <p class="text-sm text-slate-500">${THIRD_WARMUP_REPS} reps · 10RM</p>
              </div>

              <div class="rounded-2xl bg-slate-900 p-4 text-white">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-300">Estimated 1RM</p>
                <p class="mt-2 text-lg font-semibold">${roundToPlate(oneRM)} lbs/kg</p>
                <p class="text-sm text-slate-300">Working set: ${currentWeight || 0} lbs/kg</p>
              </div>
            </div>
          </div>
        </section>

        <section class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:p-6">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <h2 class="text-xl font-semibold text-slate-900">4-day recomp split tracker</h2>
              <p class="mt-1 text-sm text-slate-500">Log weight, sets, reps, and completion for each session. Everything is saved locally.</p>
            </div>

            <div class="flex flex-wrap gap-2">
              <button
                type="button"
                click.trigger="exportData()"
                class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
              >
                Export Data
              </button>
              <button
                type="button"
                click.trigger="openImportPicker()"
                class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:text-slate-900"
              >
                Import Data
              </button>
              <input ref="importInput" type="file" accept=".json,application/json" hidden change.trigger="importData($event)" />
            </div>
          </div>

          <p
            if.bind="statusMessage"
            class="mt-4 rounded-2xl px-4 py-3 text-sm ${statusTone === 'error' ? 'bg-rose-50 text-rose-700 ring-1 ring-rose-200' : 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200'}"
          >
            ${statusMessage}
          </p>

          <div class="mt-6 flex gap-2 overflow-x-auto pb-1">
            <button
              repeat.for="day of workoutDays"
              type="button"
              click.trigger="selectDay($index)"
              class="min-w-max rounded-full px-4 py-2 text-sm font-semibold transition ${$index === activeDayIndex ? 'bg-blue-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}"
            >
              ${day.title} · ${day.subtitle}
            </button>
          </div>

          <form submit.trigger="submitWorkoutForm($event)" class="mt-6 rounded-3xl bg-slate-50 p-4 sm:p-5">
            <div class="flex flex-col gap-4 border-b border-slate-200 pb-4 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <div class="flex flex-wrap items-center gap-2">
                  <h3 class="text-2xl font-semibold text-slate-900">${activeDay.title}</h3>
                  <span class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-blue-700">${activeDay.subtitle}</span>
                </div>
                <p class="mt-2 text-sm text-slate-500">
                  ${getCompletedExerciseCount(activeDay)} of ${activeDay.exercises.length} exercises completed
                </p>
              </div>

              <div class="flex flex-wrap gap-2">
                <button
                  type="submit"
                  class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-50"
                  disabled.bind="!activeDayIsDirty"
                >
                  Save workout
                </button>
                <button
                  type="button"
                  click.trigger="finishRoutine()"
                  class="rounded-full bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-500"
                >
                  Finish Routine
                </button>
              </div>
            </div>

            <div if.bind="isDayComplete(activeDay)" class="mt-4 rounded-2xl bg-emerald-50 px-4 py-3 text-sm text-emerald-700 ring-1 ring-emerald-200">
              Nice work — this routine is marked complete. Export a backup when you finish if you want an extra copy.
            </div>

            <div if.bind="activeDayIsDirty" class="mt-4 rounded-2xl bg-amber-50 px-4 py-3 text-sm text-amber-700 ring-1 ring-amber-200">
              You have unsaved changes for this day.
            </div>

            <div class="mt-4 space-y-4">
              <article
                repeat.for="exercise of activeDayDraft.exercises"
                class="rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200"
              >
                <div class="flex flex-col gap-4">
                  <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                      <div class="flex flex-wrap items-center gap-2">
                        <h4 class="text-base font-semibold text-slate-900">${exercise.name}</h4>
                        <span if.bind="exercise.tag" class="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-semibold uppercase tracking-wide text-amber-700">
                          ${exercise.tag}
                        </span>
                      </div>
                      <p class="mt-1 text-sm text-slate-500">Track the working sets for this movement.</p>
                    </div>

                    <label class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-2 text-sm font-medium text-slate-700">
                      <input type="checkbox" checked.bind="exercise.completed" change.trigger="handleCompletionChange()" class="size-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
                      Mark as completed
                    </label>
                  </div>

                  <div class="grid gap-3 sm:grid-cols-3">
                    <label class="block">
                      <span class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">Weight</span>
                      <input
                        type="text"
                        value.bind="exercise.weight"
                        input.trigger="markWorkoutFormDirty()"
                        placeholder="e.g. 185"
                        class="block w-full rounded-2xl border border-slate-300 bg-white px-3 py-2.5 text-sm shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                      />
                    </label>

                    <label class="block">
                      <span class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">Sets</span>
                      <input
                        type="text"
                        value.bind="exercise.sets"
                        input.trigger="markWorkoutFormDirty()"
                        placeholder="e.g. 3"
                        class="block w-full rounded-2xl border border-slate-300 bg-white px-3 py-2.5 text-sm shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                      />
                    </label>

                    <label class="block">
                      <span class="mb-2 block text-xs font-semibold uppercase tracking-wide text-slate-500">Reps</span>
                      <input
                        type="text"
                        value.bind="exercise.reps"
                        input.trigger="markWorkoutFormDirty()"
                        placeholder="e.g. 8-10"
                        class="block w-full rounded-2xl border border-slate-300 bg-white px-3 py-2.5 text-sm shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                      />
                    </label>
                  </div>
                </div>
              </article>
            </div>
          </form>
        </section>
      </div>

      <div if.bind="backupPromptOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/55 px-4">
        <div
          ref="backupDialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="backup-dialog-title"
          tabindex="-1"
          class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl"
        >
          <p class="text-sm font-semibold uppercase tracking-[0.25em] text-blue-600">Backup available</p>
          <h2 id="backup-dialog-title" class="mt-3 text-2xl font-semibold text-slate-900">${backupPromptDayTitle} is ready to wrap up</h2>
          <p class="mt-3 text-sm leading-6 text-slate-600">
            Would you like to export your locally saved workout data as a JSON backup before moving on?
          </p>

          <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
            <button
              type="button"
              click.trigger="dismissBackupPrompt()"
              class="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:text-slate-900"
            >
              Not now
            </button>
            <button
              type="button"
              click.trigger="exportBackupAndClose()"
              ref="backupPrimaryAction"
              class="rounded-full bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-500"
            >
              Export backup
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>
